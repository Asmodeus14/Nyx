name: NyxOS Bare Metal Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: # Allows you to force a release build without tagging

jobs:
  publish-release:
    name: Build and Publish Hardware Image
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Nightly Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Execute System Build.sh
        run: |
          chmod +x ./Build.sh
          ./Build.sh

      - name: Fallback Kernel ELF Compilation
        run: cargo build --package nyx-kernel --release

      - name: Stage Release Artifacts
        run: |
          mkdir -p release_assets
          cp target/*/release/nyx-kernel release_assets/nyxos-kernel.elf || true
          cp target/*/release/*.img release_assets/ || true
          cp target/*/release/*.efi release_assets/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
          draft: false
          prerelease: false